# Frontend only — upload this folder (or run from repo root).
# Connect to backend via VITE_API_BASE_URL in .env

services:
  frontend:
    build:
      context: ../..
      dockerfile: deploy/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://srv1831231.hstgr.cloud:8000}
    restart: unless-stopped
    ports:
      - "80:80"
