# Optional: backend + HTTPS (api subdomain). Use: docker compose -f docker-compose.caddy.yml up -d
# Frontend .env: VITE_API_BASE_URL=https://api.srv1831231.hstgr.cloud

services:
  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-z-ai}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      TAAPI_SECRET: ${TAAPI_SECRET:-}
      TAAPI_EXCHANGE: ${TAAPI_EXCHANGE:-binance}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      API_HOST: ${API_HOST:-api.srv1831231.hstgr.cloud}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
