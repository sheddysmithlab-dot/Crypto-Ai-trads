# File Manager frontend + HTTPS API (no frontend container).
# VPS: docker compose -f docker-compose.backend.yml up -d --build

services:
  backend:
    image: crypto-ai-trads-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-z-ai}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      TAAPI_SECRET: ${TAAPI_SECRET:-}
      TAAPI_EXCHANGE: ${TAAPI_EXCHANGE:-bybit}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: crypto-ai-trads-caddy-api:latest
    build:
      context: ./caddy
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      VPS_HOST: ${VPS_HOST:-srv1831231.hstgr.cloud}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
