# Hostinger VPS standalone deploy (Caddy owns ports 80/443 — no Traefik needed).
# Raw URL: https://raw.githubusercontent.com/sheddysmithlab-dot/Crypto-Ai-trads/refs/heads/main/docker-compose.yml

services:
  backend:
    image: crypto-ai-trads-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-z-ai}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      TAAPI_SECRET: ${TAAPI_SECRET:-}
      TAAPI_EXCHANGE: ${TAAPI_EXCHANGE:-binance}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: crypto-ai-trads-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://${VPS_HOST:-aitrads.in}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "test -s /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: crypto-ai-trads-caddy:latest
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      VPS_HOST: ${VPS_HOST:-aitrads.in}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
