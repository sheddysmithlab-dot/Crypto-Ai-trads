# Backend API only (no frontend container, no VPS MySQL).
# Frontend: Hostinger File Manager → aitrads.in/public_html
# DB: Hostinger website MySQL (set MYSQL_* in backend/.env)
# API URL: https://api.aitrads.in  (NOT the raw VPS hostname)
#
# VPS:
#   cp .env.example .env
#   cp backend/.env.example backend/.env   # keys + Hostinger MySQL
#   docker compose down --remove-orphans
#   docker compose up -d --build

services:
  backend:
    image: crypto-ai-trads-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    expose:
      - "8000"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-z-ai}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: crypto-ai-trads-caddy-api:latest
    build:
      context: ./caddy
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_HOST: ${API_HOST:-api.aitrads.in}
      ACME_EMAIL: ${ACME_EMAIL:-admin@aitrads.in}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
