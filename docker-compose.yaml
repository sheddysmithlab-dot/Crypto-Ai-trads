# Hostinger VPS — use with Hostinger Traefik project (ports 80/443).
# Raw URL: https://raw.githubusercontent.com/sheddysmithlab-dot/Crypto-Ai-trads/refs/heads/main/docker-compose.yml
#
# Prerequisite: deploy Hostinger "Traefik" template first (creates traefik-proxy network).

services:
  backend:
    image: crypto-ai-trads-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-z-ai}
      ZAI_MODEL: ${ZAI_MODEL:-glm-4.5-flash}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      TAAPI_SECRET: ${TAAPI_SECRET:-}
      TAAPI_EXCHANGE: ${TAAPI_EXCHANGE:-binance}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: crypto-ai-trads-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://${VPS_HOST:-srv1831231.hstgr.cloud}
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: crypto-ai-trads-caddy:latest
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - default
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-proxy
      - traefik.http.routers.crypto-ai-trads.rule=Host(`${VPS_HOST:-srv1831231.hstgr.cloud}`)
      - traefik.http.routers.crypto-ai-trads.entrypoints=websecure
      - traefik.http.routers.crypto-ai-trads.tls.certresolver=letsencrypt
      - traefik.http.services.crypto-ai-trads.loadbalancer.server.port=80
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

networks:
  traefik-proxy:
    external: true
