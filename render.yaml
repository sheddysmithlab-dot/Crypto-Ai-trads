services:
  - type: web
    name: sheddy-bybit-api
    env: python
    plan: free
    region: frankfurt  # Bybit's CloudFront blocks US-region IPs entirely (regulatory) - must NOT be oregon/ohio/virginia
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AI_PROVIDER
        value: z-ai
      - key: ZAI_MODEL
        value: glm-4.5-flash
      - key: ZAI_BASE_URL
        value: https://api.z.ai/api/paas/v4
      - key: ZAI_API_KEY
        sync: false

  - type: web
    name: sheddy-bybit
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_BASE_URL
        value: https://sheddy-bybit-api.onrender.com
