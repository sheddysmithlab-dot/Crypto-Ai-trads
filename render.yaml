services:
  - type: web
    name: api-sheddysmithlab
    env: python
    plan: free
    region: frankfurt  # Bybit blocks US-region Render IPs — use frankfurt, not oregon/virginia
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AI_PROVIDER
        value: z-ai
      - key: ZAI_MODEL
        value: glm-4.5-flash
      - key: ZAI_BASE_URL
        value: https://api.z.ai/api/paas/v4
      - key: ZAI_API_KEY
        sync: false
      - key: TAAPI_SECRET
        sync: false
      - key: TAAPI_EXCHANGE
        value: binance
      - key: BYBIT_TESTNET_API_KEY
        sync: false
      - key: BYBIT_TESTNET_API_SECRET
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false

  - type: web
    name: sheddy-bybit
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_BASE_URL
        value: https://api-sheddysmithlab.onrender.com
